name: Type-check code using alternative type-checkers

"on":
    workflow_dispatch: ~

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: read

jobs:
    pyrefly:
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Type-check code with Pyrefly
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                component: [package, scripts, tests]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                exclude:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                include:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                      python-version: ""

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Set up Python (using matrix version)
              uses: actions/setup-python@v6
              with:
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Set up Python (using `.python-version` file)
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Install uv (with matrix Python version)
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Install uv (with `.python-version` file)
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Install Pyrefly from locked dependencies
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    ARGS=("--no-group" "dev" "--group" "alternative-type-checkers")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    ARGS=("--only-group" "alternative-type-checkers" "--only-group" "build-dev")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    ARGS=("--no-group" "dev" "--group" "alternative-type-checkers" "--group" "test")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                uv sync "${ARGS[@]}"

            - name: Run Pyrefly
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    FILES=("typed_classproperties/")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    FILES=("hatch_build.custom.py")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    FILES=("tests.py")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                for FILE in "${FILES[@]}"; do
                  uv run -- pyrefly check "$FILE"
                done

    pyright:
        name: Type-check code with Pyright
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - uses: jakebailey/pyright-action@v3
