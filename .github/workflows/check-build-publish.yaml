name: Lint, type-check, test, build and publish package

"on":
    pull_request:
        branches: [main]
    push:
        branches: [main]
        tags: [v*]

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: read

jobs:
    uv-check:
        name: Validate uv lockfile
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false
                submodules: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Check uv.lock (ensure all dependencies up to date)
              run: uv lock --check

    flake8:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with Flake8
        needs: [uv-check]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install Flake8 from locked dependencies
              run: uv sync --no-group dev --group lint-format

            - name: Run Flake8
              run: uv run -- flake8

    mypy:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Type-check code with mypy
        needs: [uv-check]
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                component: [package, scripts, tests]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                exclude:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                include:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                      python-version: ""

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Set up Python (using matrix version)
              uses: actions/setup-python@v6
              with:
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Set up Python (using `.python-version` file)
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Install uv (with matrix Python version)
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Install uv (with `.python-version` file)
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install mypy from locked dependencies
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    ARGS=("--no-group" "dev" "--group" "type-check")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    ARGS=("--only-group" "type-check" "--only-group" "build-dev")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    ARGS=("--no-group" "dev" "--group" "type-check" "--group" "test")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                uv sync "${ARGS[@]}"

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: mypy|${{steps.store-hashed-python-version.outputs.hashed_python_version}}|${{matrix.component}}
                path: ./.mypy_cache

            - name: Run mypy
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    FILES=("typed_classproperties/")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    FILES=("hatch_build.custom.py")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    FILES=("tests.py")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                for FILE in "${FILES[@]}"; do
                  uv run -- mypy "$FILE"
                done

    ty:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Type-check code with ty
        needs: [uv-check]
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                component: [package, scripts, tests]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                exclude:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                include:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                      python-version: ""

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Set up Python (using matrix version)
              uses: actions/setup-python@v6
              with:
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Set up Python (using `.python-version` file)
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - if: matrix.component == 'package' || matrix.component == 'tests'
              name: Install uv (with matrix Python version)
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Install uv (with `.python-version` file)
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install ty from locked dependencies
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    ARGS=("--no-group" "dev" "--group" "type-check")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    ARGS=("--only-group" "type-check" "--only-group" "build-dev")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    ARGS=("--no-group" "dev" "--group" "type-check" "--group" "test")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                uv sync "${ARGS[@]}"

            - name: Run ty check
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    FILES=("typed_classproperties/")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    FILES=("hatch_build.custom.py")
                elif [ "${{matrix.component}}" == "tests" ]; then
                    FILES=("tests.py")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                for FILE in "${FILES[@]}"; do
                  uv run -- ty check "$FILE" --output-format=github --error-on-warning
                done

    pre-commit-PUSH:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'push'

        name: Verify pre-commit hooks (push)
        uses: ./.github/workflows/autofix-pre-commit.yaml
        with:
            skip-autofix: true

    pre-commit-PULL_REQUEST:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'pull_request'

        name: Verify pre-commit hooks and commit auto-fixes (pull_request)
        runs-on: ubuntu-latest

        steps:
            - timeout-minutes: 15
              uses: kachick/wait-other-jobs@v4.0.0
              with:
                skip-same-workflow: true
                wait-list: |
                    [
                        {
                            "workflowFile": "autofix-pre-commit.yaml",
                            "jobMatchMode": "prefix",
                            "jobName": "Run pre-commit hooks"
                        }
                    ]

    pytest:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Run test suite with pytest
        needs: [uv-check]
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: ${{matrix.python-version}}

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true
                python-version: ${{matrix.python-version}}

            - name: Install pytest from locked dependencies
              run: uv sync --no-group dev --group test

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: pytest|${{steps.store-hashed-python-version.outputs.hashed_python_version}}
                path: ./.pytest_cache

            - name: Run pytest
              run: uv run -- pytest

    ruff-lint:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with ruff
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install ruff from locked dependencies
              run: uv sync --only-group lint-format

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: ruff|${{steps.store-hashed-python-version.outputs.hashed_python_version}}
                path: ./.ruff_cache

            - name: Run ruff check
              run: uv run -- ruff check --no-fix --output-format=github

    build:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "False"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never

        if: |
            always()
            && needs.flake8.result == 'success'
            && needs.mypy.result =='success'
            && (
                needs.pre-commit-PUSH.result == 'success'
                || needs.pre-commit-PULL_REQUEST.result == 'success'
            )
            && needs.pytest.result == 'success'
            && needs.ruff-lint.result == 'success'
            && needs.uv-check.result == 'success'

        name: Build `typed_classproperties` package
        needs: [flake8, mypy, pre-commit-PUSH, pre-commit-PULL_REQUEST, pytest, ruff-lint, uv-check]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false
                submodules: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install downdoc
              run: uv tool install Pydowndoc-bin

            - name: Build package into sdist & wheels
              run: uv build --no-sources --build

            - name: Save build artifacts
              uses: actions/upload-artifact@v7
              with:
                name: built-typed_classproperties-package
                path: dist/

    publish:  # yamllint disable-line rule:key-ordering
        environment: publish

        if: always() && github.ref_type == 'tag' && needs.build.result == 'success'

        name: Publish built package to PyPI
        needs: [build]
        permissions:
            id-token: write  # Needed to authenticate to PyPI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                name: built-typed_classproperties-package
                path: dist/

            - name: Publish to PyPI
              run: uv publish

    test-publish:  # yamllint disable-line rule:key-ordering
        environment: test-publish

        if: |
            always()
            && (github.event_name != 'push' || github.ref_type != 'tag')
            && (
                github.event_name != 'pull_request'
                || github.event.pull_request.head.repo.full_name == 'CarrotManMatt/typed_classproperties'
            )
            && needs.build.result == 'success'

        name: Publish built package to Test-PyPI
        needs: [build]
        permissions:
            id-token: write  # Needed to authenticate to Test-PyPI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                name: built-typed_classproperties-package
                path: dist/

            - name: Publish to Test-PyPI
              run: uv publish --index Test-PyPI

    release:  # yamllint disable-line rule:key-ordering
        if: always() && github.ref_type == 'tag' && needs.publish.result == 'success'

        name: Create an online GitHub release
        needs: [publish]
        permissions:
            contents: write  # Needed to create a release in the GitHub repository
            id-token: write  # Needed to authenticate to GitHub API
        runs-on: ubuntu-latest

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                name: built-typed_classproperties-package
                path: dist/

            - name: Sign build artifacts
              uses: sigstore/gh-action-sigstore-python@v3.4.0
              with:
                inputs: ./dist/typed_classproperties-*.tar.gz ./dist/typed_classproperties-*.whl

            - name: Create GitHub release
              env:  # yamllint disable-line rule:key-ordering
                GITHUB_TOKEN: ${{github.token}}
                RELEASE_REPOSITORY: ${{github.repository}}
                RELEASE_TAG: ${{github.ref_name}}
              run: gh release create "${RELEASE_TAG}" dist/** --repo "${RELEASE_REPOSITORY}" --verify-tag
                --generate-notes
