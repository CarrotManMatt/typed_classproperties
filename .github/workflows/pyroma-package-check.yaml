name: Check Conformance to Packaging Best Practises

"on":
    schedule:
        - cron: 45 6 * * 4

    workflow_dispatch: ~

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: read

jobs:
    pyroma:
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Check conformance to packaging best practises with pyroma
        runs-on: ubuntu-latest

        steps:
            - id: store-current-week-number-is-even
              name: Store If the Current Week Number is Even
              run: echo "current-week-number-is-even=$((($(date +%s)/(60*60*24*7))%2))" >> "$GITHUB_OUTPUT"

            - if: github.event_name == 'workflow_dispatch' || steps.store-current-week-number-is-even.outputs.current-week-number-is-even
                == '1'
              uses: actions/checkout@v7
              with:
                persist-credentials: false
                submodules: true

            - if: github.event_name == 'workflow_dispatch' || steps.store-current-week-number-is-even.outputs.current-week-number-is-even
                == '1'
              name: Set up Python
              uses: actions/setup-python@v7
              with:
                python-version-file: .python-version

            - if: github.event_name == 'workflow_dispatch' || steps.store-current-week-number-is-even.outputs.current-week-number-is-even
                == '1'
              name: Install uv
              uses: astral-sh/setup-uv@v9.0.0
              with:
                enable-cache: true

            - if: github.event_name == 'workflow_dispatch' || steps.store-current-week-number-is-even.outputs.current-week-number-is-even
                == '1'
              name: Install pyroma from locked dependencies
              run: uv sync --only-group package-analysis

            - if: github.event_name == 'workflow_dispatch' || steps.store-current-week-number-is-even.outputs.current-week-number-is-even
                == '1'
              name: Run pyroma
              run: uv run -- pyroma --min=10 --pypi --skip-test BusFactor typed_classproperties
