name: Publish PyPI redirects

"on":
    workflow_dispatch: ~

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: none  # Reset default permissions to none

jobs:
    typed_classproperty-redirect:
        environment: redirect-publish-typed_classproperty
        name: Publish `typed_classproperty` PyPI redirect
        permissions:
            contents: read  # Needed to checkout repository contents
            id-token: write  # Needed to authenticate to PyPI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2

            - name: Build `typed_classproperty` redirect package
              run: uv build --sdist
              working-directory: ./.pypi-redirects/typed_classproperty

            - name: Publish to PyPI
              run: uv publish
              working-directory: ./.pypi-redirects/typed_classproperty
